<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thIAguinho Hub - Acesso ao Ecossistema Digital</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #050505; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #fff; 
            overflow: hidden; 
        }
        .bg-animated { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at top left, #1e293b 0%, #050505 100%); 
            z-index: -1; 
        }
        .login-card { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
            border: 1px solid #334155; 
            border-radius: 16px; 
            padding: 50px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            position: relative; 
            z-index: 1;
        }
        .form-control { 
            background-color: #020617 !important; 
            border: 1px solid #334155; 
            color: #fff !important; 
            padding: 15px; 
        }
        .form-control:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25); 
        }
        .btn-primary { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            border: none; 
            font-weight: 700; 
            letter-spacing: 1px; 
        }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
        }
        .toast-container { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 9999; 
        }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <div class="login-card text-center">
        <i class="bi bi-hexagon-fill display-1 text-primary mb-3"></i>
        <h2 class="fw-bold mb-1">thIAguinho Hub</h2>
        <p class="text-white-50 mb-4 pb-2">Ecossistema Digital Inteligente</p>
        
        <form onsubmit="realizarLogin(event)">
            <div class="mb-3 text-start">
                <label class="text-white-50 small fw-bold mb-1">UTILIZADOR / LOGIN</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-primary"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" id="username" required autocomplete="username">
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="text-white-50 small fw-bold mb-1">PALAVRA-PASSE DE ACESSO</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-primary"><i class="bi bi-key-fill"></i></span>
                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-3 shadow-lg" id="btnLogin">INICIAR SESSÃO SEGURA</button>
        </form>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // =====================================================================
        // 1. CONFIGURAÇÃO FIREBASE (ROOT)
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBqIuCsHHuy_f-mBWV4JBkbyOorXpqQvqg",
            authDomain: "hub-thiaguinho.firebaseapp.com",
            projectId: "hub-thiaguinho",
            storageBucket: "hub-thiaguinho.firebasestorage.app",
            messagingSenderId: "453508098543",
            appId: "1:453508098543:web:305f4d48edd9be40bd6e1a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Limpa qualquer sessão travada ao carregar a página de login
        window.onload = function() {
            sessionStorage.clear();
        };

        function showToast(msg, type='error') {
            const bg = type === 'success' ? 'bg-success' : 'bg-danger';
            const t = document.createElement('div');
            t.innerHTML = `<div class="toast align-items-center text-white ${bg} border-0 show p-3 mt-2 shadow-lg"><div class="d-flex"><div class="toast-body fw-bold">${msg}</div></div></div>`;
            document.getElementById('toastContainer').appendChild(t.firstChild);
            setTimeout(() => { if(t.firstChild) t.firstChild.remove() }, 4000);
        }

        function rotearParaNicho(nicho) {
            if (nicho === 'Oficinas e Estética Automotiva') {
                window.location.href = 'painel_oficina.html';
            } else {
                window.location.href = 'painel.html'; // Padrão Genérico
            }
        }

        async function realizarLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> A autenticar...';
            btn.disabled = true;

            const user = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();

            try {
                // =========================================================
                // CAMADA 1: TENTA ENTRAR COMO SUPER ADMIN (DONO DA PLATAFORMA)
                // =========================================================
                const snapS = await db.collection('superadmin').where('usuario', '==', user).get();
                if (!snapS.empty) {
                    if (snapS.docs[0].data().senha === pwd) {
                        sessionStorage.setItem('t_role', 'superadmin');
                        sessionStorage.setItem('f_nome', 'Master Admin');
                        window.location.href = 'superadmin.html';
                        return; // OBRIGATÓRIO: Impede que a leitura prossiga e caia no fallback
                    } else {
                        showToast('Palavra-passe do SuperAdmin incorreta.');
                        btn.innerHTML = 'INICIAR SESSÃO SEGURA'; btn.disabled = false;
                        return;
                    }
                }

                // =========================================================
                // CAMADA 2: TENTA ENTRAR COMO ADMIN DO TENANT (DONO DA OFICINA)
                // =========================================================
                const snapA = await db.collection('clientes_saas').where('loginAdmin', '==', user).get();
                if (!snapA.empty) {
                    const dados = snapA.docs[0].data();
                    if (dados.senhaAdmin !== pwd) { 
                        showToast('Palavra-passe da Gestão incorreta.'); 
                    }
                    else if (dados.status === 'Bloqueado') { 
                        showToast('Licença Bloqueada. Fale com o suporte da plataforma.'); 
                    }
                    else {
                        sessionStorage.setItem('t_id', snapA.docs[0].id); 
                        sessionStorage.setItem('t_nome', dados.nomeFantasia || 'A Minha Oficina'); 
                        sessionStorage.setItem('t_nicho', dados.nicho || 'Oficinas e Estética Automotiva'); 
                        sessionStorage.setItem('t_role', 'admin'); 
                        sessionStorage.setItem('f_nome', 'Administrador'); 
                        sessionStorage.setItem('t_mods', JSON.stringify(dados.modulos || {}));
                        
                        // Chaves de API Globais da Empresa
                        sessionStorage.setItem('t_gemini', (dados.apiKeys && dados.apiKeys.gemini) ? dados.apiKeys.gemini : '');
                        sessionStorage.setItem('t_cloudName', (dados.apiKeys && dados.apiKeys.cloudinaryName) ? dados.apiKeys.cloudinaryName : 'dmuvm1o6m');
                        sessionStorage.setItem('t_cloudPreset', (dados.apiKeys && dados.apiKeys.cloudinaryPreset) ? dados.apiKeys.cloudinaryPreset : 'evolution');
                        
                        rotearParaNicho(dados.nicho);
                        return;
                    }
                } else {
                    // =========================================================
                    // CAMADA 3: TENTA ENTRAR COMO FUNCIONÁRIO (GERENTE OU MECÂNICO)
                    // =========================================================
                    const snapF = await db.collection('funcionarios').where('usuario', '==', user).get();
                    if (!snapF.empty) {
                        const docF = snapF.docs[0];
                        const dadosF = docF.data();
                        
                        if (dadosF.senha !== pwd) { 
                            showToast('Palavra-passe corporativa incorreta.'); 
                        } else {
                            // Verifica o Status da Empresa Mãe antes de deixar o funcionário entrar
                            const empresaMae = await db.collection('clientes_saas').doc(dadosF.tenantId).get();
                            if(!empresaMae.exists || empresaMae.data().status === 'Bloqueado') {
                                showToast('A matriz encontra-se com a licença suspensa. Acesso negado.');
                            } else {
                                sessionStorage.setItem('t_id', dadosF.tenantId); 
                                sessionStorage.setItem('t_nome', empresaMae.data().nomeFantasia || 'A Minha Oficina');
                                sessionStorage.setItem('t_nicho', empresaMae.data().nicho || 'Oficinas e Estética Automotiva'); 
                                sessionStorage.setItem('f_id', docF.id); 
                                sessionStorage.setItem('f_nome', dadosF.nome); 
                                sessionStorage.setItem('f_comissao', dadosF.comissao || '0'); 
                                sessionStorage.setItem('t_role', dadosF.role || 'equipe'); // 'gerente' ou 'equipe'
                                sessionStorage.setItem('t_mods', JSON.stringify(empresaMae.data().modulos || {}));
                                
                                // O Funcionário herda as Chaves de API do Dono da Oficina
                                sessionStorage.setItem('t_gemini', (empresaMae.data().apiKeys && empresaMae.data().apiKeys.gemini) ? empresaMae.data().apiKeys.gemini : '');
                                sessionStorage.setItem('t_cloudName', (empresaMae.data().apiKeys && empresaMae.data().apiKeys.cloudinaryName) ? empresaMae.data().apiKeys.cloudinaryName : 'dmuvm1o6m');
                                sessionStorage.setItem('t_cloudPreset', (empresaMae.data().apiKeys && empresaMae.data().apiKeys.cloudinaryPreset) ? empresaMae.data().apiKeys.cloudinaryPreset : 'evolution');
                                
                                rotearParaNicho(empresaMae.data().nicho);
                                return;
                            }
                        }
                    } else { 
                        showToast('Utilizador não localizado no ecossistema.'); 
                    }
                }
            } catch (err) { 
                console.error("Erro no Processo de Login: ", err); 
                showToast('Falha de rede ou estrutural. Tente novamente.'); 
            }
            
            // Restaura o botão caso o login falhe em todas as etapas
            btn.innerHTML = 'INICIAR SESSÃO SEGURA'; 
            btn.disabled = false;
        }
    </script>
</body>
</html>
